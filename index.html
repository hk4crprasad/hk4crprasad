    h1 {

<body>
  <h1>HK4CRPRASAD - Super Live Ck</h1>
  <div class="container">
    <div id="jwplayerDiv">
      <img src="https://mediaready.videoready.tv/tatasky-epg/image/fetch/f_auto,fl_lossy,q_auto,h_250,w_250/https://ltsk-cdn.s3.eu-west-1.amazonaws.com/jumpstart/Temp_Live/cdn/HLS/Channel/imageContent-35365-jr3xz4uo-v5/imageContent-35365-jr3xz4uo-m6.png" alt="Super Hungama Logo">

    <script src="https://mhdzubair.top/my.js"></script>
    <script type="text/javascript" defer>
      document.addEventListener("DOMContentLoaded", function () {
        const playerInstance = jwplayer("jwplayerDiv");

        playerInstance.setup({
          autostart: true,
          pipIcon: "enabled",
          title: "Super Hungama",
          logo: {

          },
          file: "https://bpprod5linear.akamaized.net/bpk-tv/irdeto_com_Channel_252/output/manifest.mpd",
          drm: {
            clearkey: {
              "keyId": "6a9e4204f3f8577ebf6e79b3b18573f8",
              "key": "3deedae92d2697b3a47630995ebc1b32"
            }
          }
        });

        const nameElement = document.createElement('p');
        nameElement.innerText = 'Made By Haraprasad';
        nameElement.style.textAlign = 'center';
        nameElement.style.color = '#000'; // Change text color
        document.querySelector('.footer').appendChild(nameElement);

        // Automatically unmute the video while playing
        playerInstance.on('play', function () {
          playerInstance.setMute(false);
        });

        // Enhance the volume control
        playerInstance.on('volume', function (event) {
          if (event.volume > 0) {
            playerInstance.setMute(false);
          }
        });
